<script>
  function openSquare() {
    const applicationId =
      "sq0idp-Kix3HJf93J_2iJVjttEUdg";

    const callbackUrl =
      "https://kylejhartz.github.io/square-pos-test/callback.html";

    const fallbackUrl =
      "https://kylejhartz.github.io/square-pos-test/";

    const amountInput =
      Number(document.getElementById("amount").value);

    if (!Number.isFinite(amountInput) || amountInput <= 0) {
      document.getElementById("message").textContent =
        "Enter a valid amount.";
      return;
    }

    const amountInCents = Math.round(amountInput * 100);

    const isApple =
      /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
      (
        navigator.platform === "MacIntel" &&
        navigator.maxTouchPoints > 1
      );

    if (isApple) {
      const squareData = {
        amount_money: {
          amount: amountInCents,
          currency_code: "USD"
        },
        callback_url: callbackUrl,
        client_id: applicationId,
        version: "1.3",
        notes: "Website test transaction",
        options: {
          supported_tender_types: [
            "CREDIT_CARD",
            "CASH"
          ]
        }
      };

      const iosUrl =
        "square-commerce-v1://payment/create?" +
        "data=" +
        encodeURIComponent(JSON.stringify(squareData));

      window.location.href = iosUrl;
      return;
    }

    const androidIntent =
      "intent:#Intent;" +
      "action=com.squareup.pos.action.CHARGE;" +
      "package=com.squareup;" +
      "S.browser_fallback_url=" +
        encodeURIComponent(fallbackUrl) + ";" +
      "S.com.squareup.pos.WEB_CALLBACK_URI=" +
        encodeURIComponent(callbackUrl) + ";" +
      "S.com.squareup.pos.CLIENT_ID=" +
        applicationId + ";" +
      "S.com.squareup.pos.API_VERSION=v2.0;" +
      "i.com.squareup.pos.TOTAL_AMOUNT=" +
        amountInCents + ";" +
      "S.com.squareup.pos.CURRENCY_CODE=USD;" +
      "S.com.squareup.pos.TENDER_TYPES=" +
        "com.squareup.pos.TENDER_CARD," +
        "com.squareup.pos.TENDER_CASH;" +
      "end";

    window.location.href = androidIntent;
  }
</script>
