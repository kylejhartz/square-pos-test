<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Square Result</title>

  <style>
    body {
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    .result {
      padding: 20px;
      border: 1px solid #ccc;
      overflow-wrap: anywhere;
    }

    a {
      display: inline-block;
      margin-top: 24px;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <h1>Square transaction result</h1>

  <div id="result" class="result">
    Reading response…
  </div>

  <a href="./index.html">Start another transaction</a>

  <script>
    function displaySquareResult() {
      const params = new URLSearchParams(window.location.search);

      const errorCode =
        params.get("com.squareup.pos.ERROR_CODE");

      const clientTransactionId =
        params.get("com.squareup.pos.CLIENT_TRANSACTION_ID");

      const serverTransactionId =
        params.get("com.squareup.pos.SERVER_TRANSACTION_ID");

      const result = document.getElementById("result");

      if (errorCode) {
        result.innerHTML = `
          <h2>Transaction failed or was cancelled</h2>
          <p><strong>Error:</strong> ${escapeHtml(errorCode)}</p>
          <p>
            <strong>Client transaction ID:</strong>
            ${escapeHtml(clientTransactionId || "Not returned")}
          </p>
        `;
        return;
      }

      if (clientTransactionId || serverTransactionId) {
        result.innerHTML = `
          <h2>Transaction completed</h2>
          <p>
            <strong>Client transaction ID:</strong>
            ${escapeHtml(clientTransactionId || "Not returned")}
          </p>
          <p>
            <strong>Square transaction ID:</strong>
            ${escapeHtml(serverTransactionId || "No card transaction ID returned")}
          </p>
        `;
        return;
      }

      result.innerHTML = `
        <h2>No Square result detected</h2>
        <p>Full callback URL:</p>
        <pre>${escapeHtml(window.location.href)}</pre>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    displaySquareResult();
  </script>
</body>
</html>
