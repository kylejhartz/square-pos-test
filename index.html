<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Square POS Test</title>

  <style>
    body {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    label,
    input,
    button {
      display: block;
      width: 100%;
      box-sizing: border-box;
    }

    input,
    button {
      margin-top: 8px;
      margin-bottom: 20px;
      padding: 14px;
      font-size: 18px;
    }

    #diagnostic {
      padding: 12px;
      background: #eee;
      overflow-wrap: anywhere;
    }
  </style>
</head>

<body>
  <h1>Square POS Test</h1>

  <label for="amount">Charge amount</label>

  <input
    id="amount"
    type="number"
    value="1.00"
    min="0.01"
    step="0.01"
  >

  <button id="squareButton" type="button">
    Open Square POS
  </button>

  <p id="message"></p>
  <p id="diagnostic"></p>

  <script>
    const applicationId =
      "sq0idp-Kix3HJf93J_2iJVjttEUdg";

    const callbackUrl =
      "https://kylejhartz.github.io/square-pos-test/callback.html";

    function isIOSDevice() {
      const userAgent = navigator.userAgent || "";
      const platform = navigator.platform || "";

      const traditionalIOS =
        /iPad|iPhone|iPod/i.test(userAgent);

      const modernIPad =
        platform === "MacIntel" &&
        navigator.maxTouchPoints > 1;

      return traditionalIOS || modernIPad;
    }

    function showDiagnostic() {
      const detectedPlatform =
        isIOSDevice() ? "Apple/iOS" : "Not Apple/iOS";

      document.getElementById("diagnostic").textContent =
        "Detected: " + detectedPlatform +
        " | Platform: " + navigator.platform +
        " | Touch points: " + navigator.maxTouchPoints;
    }

    function openSquare() {
      const message =
        document.getElementById("message");

      message.textContent = "";

      const amountInput =
        Number(document.getElementById("amount").value);

      if (!Number.isFinite(amountInput) || amountInput <= 0) {
        message.textContent = "Enter a valid amount.";
        return;
      }

      const amountInCents =
        Math.round(amountInput * 100);

      if (isIOSDevice()) {
        const squareData = {
          amount_money: {
            amount: amountInCents,
            currency_code: "USD"
          },
          callback_url: callbackUrl,
          client_id: applicationId,
          version: "1.3",
          notes: "Website test transaction",
          options: {
            supported_tender_types: [
              "CREDIT_CARD",
              "CASH"
            ]
          }
        };

        const squareUrl =
          "square-commerce-v1://payment/create?data=" +
          encodeURIComponent(JSON.stringify(squareData));

        message.textContent = "Opening Square for iOS…";
        window.location.href = squareUrl;
        return;
      }

      message.textContent =
        "This test page did not detect an iPhone or iPad.";
    }

    document
      .getElementById("squareButton")
      .addEventListener("click", openSquare);

    showDiagnostic();
  </script>
</body>
</html>
