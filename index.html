<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Square POS Test</title>

  <style>
    body {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    label,
    input,
    button {
      display: block;
      width: 100%;
      box-sizing: border-box;
    }

    input,
    button {
      margin-top: 8px;
      margin-bottom: 20px;
      padding: 14px;
      font-size: 18px;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Square POS Test</h1>

  <label for="amount">Charge amount</label>
  <input
    id="amount"
    type="number"
    value="1.00"
    min="0.01"
    step="0.01"
  >

  <button type="button" onclick="openSquare()">
    Open Square POS
  </button>

  <p id="message"></p>

  <script>
    function openSquare() {
      const applicationId = "sq0idp-Kix3HJf93J_2iJVjttEUdg";

      const callbackUrl =
        "https://events@americanexperiment.org.github.io/square-pos-test/callback.html";

      const fallbackUrl =
        "https://events@americanexperiment.org.github.io/square-pos-test/";

      const amountInput =
        Number(document.getElementById("amount").value);

      if (!Number.isFinite(amountInput) || amountInput <= 0) {
        document.getElementById("message").textContent =
          "Enter a valid amount.";
        return;
      }

      // Square expects the total in the smallest currency unit.
      // $1.00 becomes 100 cents.
      const amountInCents = Math.round(amountInput * 100);

      const squareIntent =
        "intent:#Intent;" +
        "action=com.squareup.pos.action.CHARGE;" +
        "package=com.squareup;" +
        "S.browser_fallback_url=" +
          encodeURIComponent(fallbackUrl) + ";" +
        "S.com.squareup.pos.WEB_CALLBACK_URI=" +
          encodeURIComponent(callbackUrl) + ";" +
        "S.com.squareup.pos.CLIENT_ID=" +
          applicationId + ";" +
        "S.com.squareup.pos.API_VERSION=v2.0;" +
        "i.com.squareup.pos.TOTAL_AMOUNT=" +
          amountInCents + ";" +
        "S.com.squareup.pos.CURRENCY_CODE=USD;" +
        "S.com.squareup.pos.TENDER_TYPES=" +
          "com.squareup.pos.TENDER_CARD," +
          "com.squareup.pos.TENDER_CASH;" +
        "end";

      window.location.href = squareIntent;
    }
  </script>
</body>
</html>
